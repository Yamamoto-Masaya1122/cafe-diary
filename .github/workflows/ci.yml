name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: 型チェック
        run: npx tsc --noEmit

      - name: Lint チェック
        run: npm run lint

      - name: ビルド確認
        run: npm run build
        env:
          # Vercel/本番で必要な環境変数があれば追加
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}